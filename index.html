<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LinkDrop</title>
  <style>
    #app {
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    body {
      background: #fff;
    }

    body.ld-app-ready #app {
      opacity: 1;
    }

    body:not(.ld-app-ready) #app {
      pointer-events: none;
    }
  </style>
  <link rel="stylesheet" href="/src/styles.css">
  <script type="module" src="/src/bootstrap.js"></script>
</head>
<body>
<div id="app">

    <!-- Settings Toggle -->
    <button id="settings-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1s.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64L19.43 12.97Z"/></svg>
    </button>

    <!-- Overlay -->
    <div id="overlay"></div>

    <!-- Config Panel -->
    <aside id="config-panel">
      <div class="config-header">
        <h2 data-i18n="settings">Settings</h2>
        <button id="config-close" aria-label="Close">&times;</button>
      </div>
      <div class="config-body">
        <div class="config-section">
          <h3 data-i18n="design">Design</h3>
          <div class="design-grid" id="design-grid"></div>
        </div>
        <div class="config-section">
          <h3 data-i18n="theme">Theme</h3>
          <div class="theme-btns" id="theme-btns"></div>
        </div>
        <div class="config-section">
          <h3 data-i18n="language">Language</h3>
          <select class="lang-select" id="lang-select"></select>
        </div>
        <div class="config-section">
          <h3 data-i18n="profile">Profile</h3>
          <div class="profile-inputs">
            <input type="text" class="config-input" id="input-name" data-i18n-placeholder="namePlaceholder">
            <input type="text" class="config-input" id="input-bio" data-i18n-placeholder="bioPlaceholder">
          </div>
        </div>
        <div class="config-section">
          <h3 data-i18n="avatarSettings">Avatar</h3>
          <div class="avatar-config" id="avatar-config"></div>
        </div>
        <div class="config-section">
          <h3 data-i18n="links">Links</h3>
          <div class="links-config" id="links-config"></div>
        </div>
        <div class="config-section">
          <h3 data-i18n="particles">Particles</h3>
          <div class="particle-config" id="particle-config"></div>
        </div>
        <div class="config-section">
          <h3 data-i18n="contactForm">Contact Form</h3>
          <div class="contact-config" id="contact-config"></div>
        </div>
      </div>
    </aside>

    <!-- Preview -->
    <main id="preview">
      <div id="particles"></div>
      <div class="preview-inner">
        <div class="terminal-bar">
          <div class="terminal-dots"><span class="terminal-dot"></span><span class="terminal-dot"></span><span class="terminal-dot"></span></div>
          <span class="terminal-title">linkdrop &mdash; bash &mdash; 80&times;24</span>
        </div>
        <section class="profile-section">
          <div class="avatar" id="avatar"></div>
          <h1 class="profile-name" id="display-name"></h1>
          <p class="profile-bio" id="display-bio"></p>
        </section>
        <section class="links-section" id="links-container"></section>
        <section class="contact-section" id="contact-section"></section>
        <div class="terminal-cursor"></div>
      </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>
</body>
</html>
